volumes:
  db: null
  sock: null

services:
  coolify-wordpress:
    container_name: coolify-wordpress 
    build:
      context: .
      dockerfile: Dockerfile
    # restart: unless-stopped
    mem_limit: ${WP_MEM_LIMIT:-512m}
    cpus: ${WP_CPU_LIMIT:-2}
    depends_on:
      - coolify-wordpress-db
      # - coolify-wordpress-valkey
    volumes:
      - './wordpress:/usr/src/wordpress'
      - './db:/var/db'
      - 'sock:/tmp/sock:ro'
    ports:
      - "8081:80"
    environment:
      TZ: America/Detroit
      DB_HOST: 'localhost:/tmp/sock/mysqld.sock'
      DB_NAME: 'wp'
      MDBU: 'wp'
      MDBP: 'wp'
      REDIS_HOST: /tmp/sock/valkey.sock
      # ADDITIONAL_PLUGINS: 'w3-total-cache fluent-smtp better-wp-security simple-cloudflare-turnstile'
      CRON: |
        */30 * * * * sleep $(tr -dc 0-9 < /dev/urandom | head -c2) && wp db export --path=/usr/src/wordpress /var/db/wp.sql

  coolify-wordpress-db:
    container_name: coolify-wordpress-mariadb
    image: 'yobasystems/alpine-mariadb:11'
    # restart: unless-stopped
    mem_limit: ${WP_MEM_LIMIT:-512m}
    environment:
      MYSQL_DATABASE: wp
      MYSQL_USER: wp
      MYSQL_PASSWORD: wp
      MYSQL_ROOT_PASSWORD: wp
    volumes:
      - 'sock:/var/run/mysqld'
      - 'db:/var/lib/mysql'
      - './config/my.cnf:/etc/my.cnf'
      - './config/db-entrypoint.sh:/scripts/run.sh'

  # coolify-wordpress-valkey:
  #   container_name: coolify-wordpress-valkey
  #   image: 'valkey/valkey:8-alpine'
  #   # restart: unless-stopped
  #   command: sh -c "mkdir -p /tmp/sock && rm -f /tmp/sock/valkey.sock && valkey-server /usr/local/etc/valkey/valkey.conf"
  #   volumes:
  #     - './config/valkey.conf:/usr/local/etc/valkey/valkey.conf'
  #     - 'sock:/tmp/sock'
